<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚽ জাহাঙ্গীর আইপি টিভি | PRO EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== কালার থিম ===== */
        :root {
            --primary: #00bcd4;
            --primary-dark: #0097a7;
            --primary-glow: rgba(0, 188, 212, 0.3);
            --accent: #ff6f00;
            --accent-gold: #ffab00;
            --bg-main: #0a0e17;
            --bg-card: #111927;
            --bg-hover: #1a2744;
            --text: #ffffff;
            --text-dim: #7a8aa8;
            --border: #1a2a44;
            --shadow: 0 8px 40px rgba(0, 188, 212, 0.06);
            --radius: 14px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-main); color: var(--text); display: flex; justify-content: center; padding: 10px; min-height: 100vh; }
        .app { max-width: 1300px; width: 100%; }

        /* ===== হেডার ===== */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px; padding: 12px 20px;
            background: linear-gradient(135deg, #050a14 0%, var(--bg-card) 100%);
            border-radius: var(--radius) var(--radius) 0 0;
            border-bottom: 2px solid rgba(0, 188, 212, 0.2);
        }
        .header .logo { display: flex; align-items: center; gap: 14px; }
        .header .logo .icon-box {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 40px var(--primary-glow);
        }
        .header .logo .brand {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .logo .brand small {
            font-size: 12px; font-weight: 400;
            -webkit-text-fill-color: var(--text-dim);
            display: block;
            letter-spacing: 1px;
        }
        .header .stats-group { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .header .stats-group .stat-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--text-dim);
        }
        .header .stats-group .stat-item .dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .dot.green { background: #00e676; box-shadow: 0 0 12px #00e676; }
        .dot.red { background: #ff5252; box-shadow: 0 0 12px #ff5252; }
        .dot.gold { background: var(--accent-gold); box-shadow: 0 0 12px var(--accent-gold); }
        .header .badge-live {
            background: #ff5252; color: #fff; padding: 4px 16px;
            border-radius: 20px; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            animation: pulse-live 1.5s infinite;
        }
        @keyframes pulse-live { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ===== ভিজিটর বার ===== */
        .visitor-bar {
            background: var(--bg-card); padding: 8px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 8px;
            border-bottom: 1px solid var(--border);
        }
        .visitor-bar .visitor-info {
            display: flex; align-items: center; gap: 16px;
            font-size: 12px; color: var(--text-dim);
        }
        .visitor-bar .visitor-info i { color: var(--accent-gold); }
        .visitor-bar .visitor-info .count { color: #fff; font-weight: 700; font-size: 14px; }
        .visitor-bar .live-viewers {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 82, 82, 0.1);
            padding: 4px 14px; border-radius: 20px;
            border: 1px solid rgba(255, 82, 82, 0.2);
        }
        .visitor-bar .live-viewers .pulse-dot {
            width: 8px; height: 8px; background: #ff5252;
            border-radius: 50%; animation: pulse-dot 1s infinite;
        }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }

        /* ===== প্লেয়ার ===== */
        .player-container {
            background: var(--bg-card);
            border-radius: 0 0 var(--radius) var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .player-wrapper { position: relative; background: #000; }
        #video-player { width: 100%; aspect-ratio: 16/9; display: block; background: #0a0a0a; }

        /* ===== কন্ট্রোল ===== */
        .custom-controls {
            background: rgba(0, 0, 0, 0.95);
            padding: 6px 14px;
            display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
            border-top: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }
        .custom-controls button {
            background: transparent; border: none; color: #ccc; font-size: 16px;
            cursor: pointer; padding: 4px 8px; border-radius: 6px;
            transition: var(--transition); min-width: 32px; min-height: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .custom-controls button:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .custom-controls .progress-container {
            flex: 1; min-width: 80px; height: 4px; background: #2a2a3a;
            border-radius: 4px; position: relative; cursor: pointer;
            transition: height 0.2s;
        }
        .custom-controls .progress-container:hover { height: 6px; }
        .custom-controls .progress-fill {
            height: 100%; background: var(--primary); border-radius: 4px;
            width: 0%; transition: width 0.1s; position: relative;
        }
        .custom-controls .progress-fill::after {
            content: ''; position: absolute; right: -4px; top: -3px;
            width: 10px; height: 10px; background: var(--primary);
            border-radius: 50%; opacity: 0; transition: opacity 0.2s;
        }
        .custom-controls .progress-container:hover .progress-fill::after { opacity: 1; }
        .custom-controls .progress-buffer {
            height: 100%; background: #444; border-radius: 4px;
            width: 0%; position: absolute; top: 0; left: 0;
        }
        .custom-controls .time-display {
            color: #aaa; font-size: 11px; font-family: monospace;
            min-width: 90px; text-align: center;
        }
        .custom-controls .volume-wrap { display: flex; align-items: center; gap: 4px; }
        .custom-controls .volume-slider {
            width: 50px; height: 3px; -webkit-appearance: none;
            background: #333; border-radius: 2px; outline: none;
        }
        .custom-controls .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            border-radius: 50%; background: var(--primary); cursor: pointer;
        }
        .custom-controls select {
            background: #1a1a28; color: #ddd; border: 1px solid #333;
            padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
        }
        .custom-controls select:focus { outline: none; border-color: var(--primary); }
        .custom-controls .fullscreen-btn { font-size: 18px; }

        /* ===== টুলবার ===== */
        .toolbar {
            background: var(--bg-card); padding: 8px 14px;
            display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .toolbar input {
            flex: 2; min-width: 120px; padding: 6px 14px;
            border-radius: 8px; border: 1px solid var(--border);
            background: #0a0a14; color: #ddd; font-size: 12px;
            transition: var(--transition);
        }
        .toolbar input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 20px var(--primary-glow); }
        .toolbar button {
            padding: 6px 14px; border: none; border-radius: 8px;
            font-weight: 600; font-size: 11px; cursor: pointer;
            transition: var(--transition); white-space: nowrap;
        }
        .toolbar button.primary { background: var(--primary); color: #000; }
        .toolbar button.primary:hover { background: var(--primary-dark); transform: scale(1.02); }
        .toolbar button.secondary { background: #1e1e30; color: #ccc; }
        .toolbar button.secondary:hover { background: #2a2a40; color: #fff; }
        .toolbar button.gold { background: var(--accent-gold); color: #000; }
        .toolbar button.gold:hover { background: #ffab00; transform: scale(1.02); }
        .toolbar button.danger { background: #ff5252; color: #fff; }
        .toolbar button.danger:hover { background: #ff1744; }

        /* ===== স্ট্যাটাস ===== */
        .status-bar {
            background: var(--bg-card); padding: 4px 14px;
            display: flex; justify-content: space-between; flex-wrap: wrap;
            gap: 4px; border-bottom: 1px solid var(--border);
            font-size: 11px; color: var(--text-dim);
        }
        .status-bar .now-playing { color: var(--primary); font-weight: 600; max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ===== ফিল্টার ===== */
        .filter-bar {
            padding: 6px 14px; background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
        }
        .filter-bar input {
            flex: 1; min-width: 100px; padding: 5px 14px;
            border-radius: 20px; border: 1px solid var(--border);
            background: #0a0a14; color: #fff; font-size: 11px;
            transition: var(--transition);
        }
        .filter-bar input::placeholder { color: #555; }
        .filter-bar input:focus { border-color: var(--primary); outline: none; }
        .filter-bar select {
            background: #0a0a14; color: #ddd; border: 1px solid var(--border);
            padding: 4px 12px; border-radius: 20px; font-size: 10px; cursor: pointer;
        }
        .filter-bar select:focus { outline: none; border-color: var(--primary); }
        .filter-bar .sub-btn {
            background: transparent; border: 1px solid var(--border);
            color: #aaa; padding: 3px 12px; border-radius: 20px;
            font-size: 10px; cursor: pointer; transition: var(--transition);
        }
        .filter-bar .sub-btn:hover { border-color: var(--primary); color: #fff; }
        .filter-bar .sub-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0,188,212,0.08); }
        .filter-bar .filter-count { color: #555; font-size: 10px; }

        /* ===== চ্যানেল গ্রিড ===== */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 6px;
            max-height: 380px;
            overflow-y: auto;
            padding: 10px 14px;
            background: var(--bg-main);
        }
        .channel-grid::-webkit-scrollbar { width: 4px; }
        .channel-grid::-webkit-scrollbar-track { background: transparent; }
        .channel-grid::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .channel-item {
            background: var(--bg-card); padding: 8px 4px; border-radius: 10px;
            text-align: center; font-size: 10px; cursor: pointer;
            transition: var(--transition); border: 1.5px solid transparent;
            word-break: break-word; line-height: 1.3; color: #bbb;
            position: relative;
        }
        .channel-item:hover { background: var(--bg-hover); transform: translateY(-2px); color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .channel-item.active { border-color: var(--primary); background: rgba(0,188,212,0.06); color: #fff; box-shadow: 0 0 30px var(--primary-glow); }
        .channel-item .status-indicator {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            margin-right: 4px; vertical-align: middle;
        }
        .channel-item .status-indicator.green { background: #00e676; box-shadow: 0 0 8px #00e676; }
        .channel-item .status-indicator.red { background: #ff5252; box-shadow: 0 0 8px #ff5252; }
        .channel-item .status-indicator.gray { background: #444; }
        .channel-item .flag { font-size: 14px; display: block; }
        .channel-item .channel-name { display: block; font-weight: 500; margin-top: 2px; }
        .channel-item .badge { display: block; font-size: 7px; color: #555; margin-top: 1px; text-transform: uppercase; letter-spacing: 0.3px; }
        .empty-state { color: #444; text-align: center; padding: 30px; grid-column: 1/-1; font-size: 13px; }

        /* ===== সাবটাইটেল ===== */
        .subtitle-overlay {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: #fff; padding: 6px 18px;
            border-radius: 8px; font-size: 17px; text-align: center;
            max-width: 85%; pointer-events: none; display: none;
            font-weight: 500; text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.05); line-height: 1.5; z-index: 10;
        }
        .subtitle-overlay .sub-ar { color: #ffd54f; font-size: 13px; display: block; margin-bottom: 2px; }
        .subtitle-overlay .sub-bn { color: #fff; font-size: 17px; display: block; }
        .subtitle-overlay.show { display: block; }

        /* ===== ফুটার ===== */
        .brand-footer {
            background: linear-gradient(135deg, var(--bg-card), #080c18);
            padding: 12px 18px; border-top: 1px solid rgba(0, 188, 212, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 8px;
        }
        .brand-footer .brand-name {
            font-size: 14px; font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 8px;
        }
        .brand-footer .brand-name small {
            font-weight: 400; color: #666; font-size: 10px;
            -webkit-text-fill-color: #666;
        }
        .brand-footer .social { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
        .brand-footer .social a {
            color: #888; text-decoration: none; font-size: 11px;
            transition: var(--transition); display: flex; align-items: center; gap: 4px;
        }
        .brand-footer .social a:hover { color: var(--primary); }
        .brand-footer .social .dev { color: #444; font-size: 10px; }
        .brand-footer .social .dev span {
            background: linear-gradient(135deg, var(--primary), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .spinner {
            display: inline-block; width: 12px; height: 12px;
            border: 2px solid var(--primary); border-radius: 50%;
            border-top-color: transparent; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header .logo .brand { font-size: 18px; }
            .header .logo .icon-box { width: 40px; height: 40px; font-size: 20px; }
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); max-height: 280px; }
            .custom-controls .volume-slider { width: 35px; }
            .custom-controls .time-display { font-size: 10px; min-width: 70px; }
            .custom-controls button { font-size: 14px; min-width: 28px; min-height: 28px; }
            .brand-footer { flex-direction: column; align-items: center; text-align: center; }
            .visitor-bar { flex-direction: column; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .header .logo .brand { font-size: 15px; }
            .header .badge-live { font-size: 8px; padding: 2px 10px; }
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); max-height: 220px; }
            .channel-item { font-size: 9px; padding: 5px 3px; }
            .subtitle-overlay { font-size: 14px; bottom: 60px; }
            .subtitle-overlay .sub-bn { font-size: 14px; }
            .toolbar input { min-width: 100%; }
            .custom-controls .progress-container { min-width: 50px; }
        }
        @media screen and (orientation: landscape) and (max-height: 500px) {
            .header, .visitor-bar, .toolbar, .status-bar, .filter-bar, .brand-footer {
                display: none !important;
            }
            .player-container { border-radius: 0 !important; border: none !important; height: 100vh !important; width: 100vw !important; position: fixed !important; top: 0 !important; left: 0 !important; z-index: 9999 !important; background: #000 !important; }
            .player-wrapper { height: 100% !important; }
            #video-player { height: 100% !important; aspect-ratio: auto !important; }
            .custom-controls { position: absolute !important; bottom: 0 !important; left: 0 !important; right: 0 !important; background: rgba(0,0,0,0.85) !important; z-index: 10 !important; display: flex !important; }
            .app { padding: 0 !important; max-width: 100% !important; }
            body { padding: 0 !important; overflow: hidden !important; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- ===== হেডার ===== -->
    <header class="header">
        <div class="logo">
            <div class="icon-box">📡</div>
            <div>
                <span class="brand">জাহাঙ্গীর আইপি টিভি <small>⚡ PRO EDITION</small></span>
            </div>
        </div>
        <div class="stats-group">
            <span class="stat-item"><span class="dot green"></span> <span id="online-count">০</span></span>
            <span class="stat-item"><span class="dot red"></span> <span id="offline-count">০</span></span>
            <span class="stat-item"><span class="dot gold"></span> <span id="total-count">০</span></span>
            <span class="badge-live">🔴 লাইভ</span>
        </div>
    </header>

    <!-- ===== ভিজিটর বার ===== -->
    <div class="visitor-bar">
        <div class="visitor-info">
            <i class="fa-solid fa-eye"></i>
            <span>ভিজিটর:</span>
            <span class="count" id="visitor-count">০</span>
            <i class="fa-solid fa-users" style="margin-left:10px;"></i>
            <span>অনলাইন:</span>
            <span class="count" id="online-viewers">০</span>
        </div>
        <div class="live-viewers">
            <span class="pulse-dot"></span>
            <span style="font-size:11px;color:#aaa;">লাইভ ভিউয়ার</span>
            <span style="font-size:13px;font-weight:700;color:#fff;" id="live-count">১২</span>
        </div>
    </div>

    <!-- ===== প্লেয়ার ===== -->
    <div class="player-container">
        <div class="player-wrapper">
            <video id="video-player" playsinline></video>
            <div class="subtitle-overlay" id="subtitle-overlay">
                <span class="sub-ar" id="sub-ar">النص العربي</span>
                <span class="sub-bn" id="sub-bn">বাংলা অনুবাদ</span>
            </div>
        </div>

        <!-- ===== কন্ট্রোল ===== -->
        <div class="custom-controls">
            <button id="play-btn" title="প্লে/পজ">⏸</button>
            <button id="stop-btn" title="স্টপ">⏹</button>
            <div class="progress-container" id="progress-bar">
                <div class="progress-buffer" id="progress-buffer"></div>
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="time-display" id="time-display">00:00 / 00:00</span>
            <div class="volume-wrap">
                <button id="mute-btn" title="মিউট">🔊</button>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
            </div>
            <select id="quality-select" title="ভিডিও কোয়ালিটি">
                <option value="auto">🔄 অটো</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
                <option value="480p">480p</option>
                <option value="360p">360p</option>
            </select>
            <button class="fullscreen-btn" id="fullscreen-btn" title="পূর্ণস্ক্রিন">⛶</button>
        </div>

        <!-- ===== টুলবার ===== -->
        <div class="toolbar">
            <input type="text" id="playlist-url" value="https://iptv-org.github.io/iptv/index.category.m3u" placeholder="M3U / M3U8 লিংক">
            <button class="primary" onclick="loadPlaylist()">📥 লোড</button>
            <button class="secondary" onclick="prevChannel()">⏪</button>
            <button class="secondary" onclick="nextChannel()">⏩</button>
            <button id="toggle-auto" class="secondary" onclick="toggleAutoSkip()" style="background:var(--primary);color:#000;">▶️ অটো</button>
            <button class="gold" onclick="loadDefaultPlaylists()">🔗 ১০k+ লোড</button>
            <button class="danger" onclick="clearChannels()">🗑️</button>
        </div>

        <!-- ===== স্ট্যাটাস ===== -->
        <div class="status-bar">
            <span class="now-playing" id="now-playing">⏳ চ্যানেল লোড হচ্ছে...</span>
            <span id="channel-counter">০টি চ্যানেল</span>
        </div>

        <!-- ===== ফিল্টার ===== -->
        <div class="filter-bar">
            <input type="text" id="filter-input" placeholder="🔍 ফিল্টার (FIFA, BD, Sports...)" oninput="filterChannels()">
            <span style="color:#555;font-size:10px;">🌐 ভাষা:</span>
            <select id="lang-select" onchange="translateChannelNames()">
                <option value="bn">বাংলা</option>
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="hi">हिन्दी</option>
                <option value="ur">اردو</option>
            </select>
            <button class="sub-btn active" id="sub-toggle" onclick="toggleSubtitles()">📝 সাব</button>
            <span class="filter-count" id="filter-count"></span>
        </div>

        <!-- ===== চ্যানেল লিস্ট ===== -->

    async function loadDefaultPlaylists() {
        nowPlayingEl.innerHTML = '⏳ ১০,০০০+ চ্যানেল লোড হচ্ছে...';
        let allChannels = [...WORKING_CHANNELS];
        let loaded = 0;

        for (const pl of DEFAULT_PLAYLISTS) {
            try {
                const resp = await fetch(pl.url, { cache: 'no-store' });
                if (resp.ok) {
                    const text = await resp.text();
                    const parsed = parseM3U(text);
                    parsed.forEach(ch => {
                        if (!ch.group) ch.group = pl.name;
                        if (!ch.flag) ch.flag = '🌍';
                    });
                    allChannels = allChannels.concat(parsed);
                    loaded++;
                }
            } catch (e) { console.warn(`⚠️ ${pl.name} লোড ব্যর্থ:`, e); }
        }

        const unique = [];
        const seen = new Set();
        for (const ch of allChannels) {
            if (ch.url && !seen.has(ch.url)) {
                seen.add(ch.url);
                unique.push(ch);
            }
        }

        if (unique.length === 0) {
            nowPlayingEl.textContent = '❌ কোনো চ্যানেল পাওয়া যায়নি';
            return;
        }

        channels = unique;
        currentIndex = -1;
        channelStatus = {};
        channels.forEach(ch => { channelStatus[ch.url] = 'gray'; });

        renderChannels(channels);
        updateStats();
        counterEl.textContent = `${channels.length}টি চ্যানেল`;
        nowPlayingEl.textContent = `✅ ${channels.length}টি চ্যানেল লোড হয়েছে (FIFA সহ)`;
        nextChannel();
    }

    // ============================================================
    //  M3U পার্সার
    // ============================================================
    function parseM3U(data) {
        const lines = data.split(/\r?\n/);
        const result = [];
        let current = null;
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const match = line.match(/#EXTINF:[^,]*,\s*(.+)/);
                let name = match ? match[1].trim() : 'Unknown';
                const tvgMatch = line.match(/tvg-name="([^"]*)"/);
                if (tvgMatch && tvgMatch[1]) name = tvgMatch[1].trim();
                const groupMatch = line.match(/group-title="([^"]*)"/);
                const group = groupMatch ? groupMatch[1] : '';
                current = { name, url: '', group, flag: '🌍' };
            } else if (line && !line.startsWith('#') && current) {
                if (line.startsWith('http://') || line.startsWith('https://')) {
                    current.url = line;
                    if (current.url) result.push({ ...current });
                }
                current = null;
            }
        }
        return result;
    }

    async function loadPlaylist() {
        const url = document.getElementById('playlist-url').value.trim();
        if (!url) { nowPlayingEl.textContent = '⚠️ দয়া করে একটি URL দিন'; return; }
        nowPlayingEl.innerHTML = '⏳ লোড হচ্ছে...';
        try {
            const resp = await fetch(url, { cache: 'no-store' });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const text = await resp.text();
            const parsed = parseM3U(text);
            if (parsed.length === 0) throw new Error('কোনো চ্যানেল পাওয়া যায়নি');
            
            const existingUrls = new Set(channels.map(c => c.url));
            for (const ch of parsed) {
                if (!existingUrls.has(ch.url)) {
                    channels.push(ch);
                    existingUrls.add(ch.url);
                    channelStatus[ch.url] = 'gray';
                }
            }
            
            currentIndex = -1;
            renderChannels(channels);
            updateStats();
            counterEl.textContent = `${channels.length}টি চ্যানেল`;
            nowPlayingEl.textContent = `✅ ${parsed.length}টি নতুন চ্যানেল যোগ হয়েছে (মোট ${channels.length})`;
            nextChannel();
        } catch (err) {
            nowPlayingEl.textContent = `❌ লোড ব্যর্থ: ${err.message}`;
        }
    }

            renderChannels(channels);
            updateStats();
            counterEl.textContent = '০টি চ্যানেল';
            nowPlayingEl.textContent = '🗑️ সব চ্যানেল মুছে ফেলা হয়েছে';
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.pause();
            video.src = '';
        }
    }

    // ============================================================
    //  সাবটাইটেল
    // ============================================================
    const AR_TO_BN = {
        'هدف': 'গোল', 'تمريرة': 'পাস', 'تسديدة': 'শট', 'حكم': 'রেফারি',
        'ملعب': 'স্টেডিয়াম', 'مباراة': 'ম্যাচ', 'دوري': 'লীগ', 'كأس': 'কাপ',
        'نهائي': 'ফাইনাল', 'تسجيل': 'স্কোর', 'فريق': 'দল', 'لاعب': 'খেলোয়াড়',
        'مدرب': 'কোচ', 'جمهور': 'দর্শক', 'كرة القدم': 'ফুটবل',
        'أخبار': 'সংবাদ', 'عاجل': 'জরুরি', 'مرحبا': 'স্বাগতম', 'شكرا': 'ধন্যবাদ'
    };

    function translateArabic(text) {
        let translated = text;
        for (const [ar, bn] of Object.entries(AR_TO_BN)) {
            if (text.includes(ar)) {
                translated = translated.replace(new RegExp(ar, 'g'), bn);
            }
        }
        return translated;
    }

    function generateSubtitle() {
        const phrases = ['هدف رائع!', 'تمريرة جميلة', 'تسديدة قوية', 'مباراة مثيرة', 'كأس العالم'];
        const ar = phrases[Math.floor(Math.random() * phrases.length)];
        return { ar: ar, bn: translateArabic(ar) };
    }

    function showSubtitles(arText, bnText) {
        if (!subtitlesEnabled) return;
        subAr.textContent = arText || '...';
        subBn.textContent = bnText || '...';
        subtitleOverlay.classList.add('show');
    }
    function hideSubtitles() { subtitleOverlay.classList.remove('show'); }
    function startSubtitleTimer() {
        if (subtitleTimer) clearInterval(subtitleTimer);
        if (!subtitlesEnabled) return;
        subtitleTimer = setInterval(() => {
            if (!video.paused && currentIndex >= 0) {
                const { ar, bn } = generateSubtitle();
                showSubtitles(ar, bn);
            }
        }, 5000);
        setTimeout(() => { const { ar, bn } = generateSubtitle(); showSubtitles(ar, bn); }, 1000);
    }
    function stopSubtitleTimer() { if (subtitleTimer) { clearInterval(subtitleTimer); subtitleTimer = null; } }
    function toggleSubtitles() {
        subtitlesEnabled = !subtitlesEnabled;
        subToggle.classList.toggle('active');
        subToggle.textContent = subtitlesEnabled ? '📝 সাব' : '📝 বন্ধ';
        if (!subtitlesEnabled) { hideSubtitles(); stopSubtitleTimer(); } else { startSubtitleTimer(); }
    }

    // ============================================================
    //  ট্রান্সলেশন
    // ============================================================
    const TRANSLATIONS = {
        'bn': { 'Sports': 'খেলা', 'News': 'সংবাদ', 'Movies': 'সিনেমা', 'Bangladesh': 'বাংলাদেশ', 'FIFA': 'ফিফা', 'আরবি স্পোর্টস': 'আরবি খেলা' },
        'en': { 'Sports': 'Sports', 'News': 'News', 'Movies': 'Movies', 'Bangladesh': 'Bangladesh', 'FIFA': 'FIFA', 'আরবি স্পোর্টস': 'Arabic Sports' },
        'ar': { 'Sports': 'رياضة', 'News': 'أخبار', 'Movies': 'أفلام', 'Bangladesh': 'بنغلاديش', 'FIFA': 'فيفا', 'আরবি স্পোর্টস': 'الرياضة العربية' },
        'es': { 'Sports': 'Deportes', 'News': 'Noticias', 'Movies': 'Películas', 'Bangladesh': 'Bangladés', 'FIFA': 'FIFA', 'আরবি স্পোর্টস': 'Deportes Árabes' },
        'fr': { 'Sports': 'Sports', 'News': 'Actualités', 'Movies': 'Films', 'Bangladesh': 'Bangladesh', 'FIFA': 'FIFA', 'আরবি স্পোর্টস': 'Sports Arabes' },
        'hi': { 'Sports': 'खेल', 'News': 'समाचार', 'Movies': 'फिल्में', 'Bangladesh': 'बांग्लादेश', 'FIFA': 'फीफा', 'আরবি স্পোর্টস': 'अरबी खेल' },
        'ur': { 'Sports': 'کھیل', 'News': 'خبریں', 'Movies': 'فلمیں', 'Bangladesh': 'بنگلہ دیش', 'FIFA': 'فیفا', 'আরবি স্পোর্টস': 'عربی کھیل' },
    };

    function translateGroup(group, lang) {
        const dict = TRANSLATIONS[lang] || TRANSLATIONS['bn'];
        return dict[group] || group;
    }
    function translateChannelNames() {
        currentLang = langSelect.value;
        renderChannels(channels);
        if (currentIndex >= 0 && channels[currentIndex]) {
            nowPlayingEl.textContent = `▶️ ${channels[currentIndex].name}`;
        }
    }

    // ============================================================
    //  রেন্ডার
    // ============================================================
    function renderChannels(list) {
        channelListEl.innerHTML = '';
        if (!list || list.length === 0) {
            channelListEl.innerHTML = `<div class="empty-state">🚀 কোন চ্যানেল নেই</div>`;
            return;
        }
        const lang = currentLang;
        list.forEach((ch, idx) => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            if (idx === currentIndex) div.classList.add('active');
            
            const status = channelStatus[ch.url] || 'gray';
            const dot = document.createElement('span');
            dot.className = `status-indicator ${status}`;
            div.appendChild(dot);
            
            if (ch.flag) {
                const flag = document.createElement('span');
                flag.className = 'flag';
                flag.textContent = ch.flag;
                div.appendChild(flag);
            }
            const nameSpan = document.createElement('span');
            nameSpan.className = 'channel-name';
            nameSpan.textContent = ch.name.length > 16 ? ch.name.slice(0, 14) + '…' : ch.name;
            div.appendChild(nameSpan);
            if (ch.group) {
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = translateGroup(ch.group, lang);
                div.appendChild(badge);
            }
            div.title = ch.name;
            div.dataset.index = idx;
            div.onclick = () => playChannel(idx);
            channelListEl.appendChild(div);
        });
        applyFilter();
    }

    function filterChannels() {
        const q = filterInput.value.toLowerCase().trim();
        const items = channelListEl.querySelectorAll('.channel-item');
        let visible = 0;
        items.forEach((el, i) => {
            const name = channels[i]?.name?.toLowerCase() || '';
            const group = channels[i]?.group?.toLowerCase() || '';
            const match = !q || name.includes(q) || group.includes(q);
            el.style.display = match ? 'block' : 'none';
            if (match) visible++;
        });
        filterCount.textContent = q ? `(${visible} দেখানো)` : '';
    }
    function applyFilter() { filterChannels(); }

    function updateStats() {
        let online = 0, offline = 0;
        for (const [url, status] of Object.entries(channelStatus)) {
            if (status === 'green') online++;
            else if (status === 'red') offline++;
        }
        onlineCountEl.textContent = online;
        offlineCountEl.textContent = offline;
        totalCountEl.textContent = channels.length;
    }

    // ============================================================
    //  চ্যানেল প্লে
    // ============================================================
    function playChannel(index) {
        if (index < 0 || index >= channels.length) return;

        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (skipTimer) { clearTimeout(skipTimer); skipTimer = null; }
        stopSubtitleTimer();

        currentIndex = index;
        const channel = channels[currentIndex];
        if (!channel || !channel.url) {
            nowPlayingEl.textContent = '❌ URL নেই';
            channelStatus[channel?.url] = 'red';
            updateStats();
            setTimeout(() => nextChannel(), 1500);
            return;
        }

        nowPlayingEl.innerHTML = `<span class="spinner"></span> ${channel.name} লোড হচ্ছে...`;
        playBtn.textContent = '⏸';
        channelStatus[channel.url] = 'gray';
        updateStats();

        document.querySelectorAll('.channel-item').forEach((el, i) => {
            el.classList.toggle('active', i === currentIndex);
            const ch = channels[i];
            if (ch) {
                const dot = el.querySelector('.status-indicator');
                if (dot) {
                    dot.className = `status-indicator ${channelStatus[ch.url] || 'gray'}`;
                }
            }
        });
        const activeEl = channelListEl.querySelector('.channel-item.active');
        if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

        if (Hls.isSupported()) {
            hlsInstance = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backbufferLength: 0,
                maxBufferLength: 2,
                manifestLoadingTimeOut: 30000,
                manifestLoadingMaxRetry: 3,
                levelLoadingTimeOut: 25000,
                levelLoadingMaxRetry: 3,
                xhrSetup: function(xhr, url) { xhr.withCredentials = false; }
            });

            hlsInstance.loadSource(channel.url);
            hlsInstance.attachMedia(video);

            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                if (currentQuality !== 'auto') {
                    const levels = hlsInstance.levels;
                    if (levels && levels.length > 0) {
                        const map = { '1080p': 0, '720p': 1, '480p': 2, '360p': 3 };
                        const idx = map[currentQuality] !== undefined ? map[currentQuality] : -1;
                        hlsInstance.currentLevel = (idx >= 0 && idx < levels.length) ? idx : levels.length - 1;
                    }
                }
                video.play().then(() => {
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    nowPlayingEl.textContent = `▶️ ${channel.name}`;
                    channelStatus[channel.url] = 'green';
                    updateStats();
                    document.querySelectorAll('.channel-item').forEach((el, i) => {
                        const ch = channels[i];
                        if (ch) {
                            const dot = el.querySelector('.status-indicator');
                            if (dot) {
                                dot.className = `status-indicator ${channelStatus[ch.url] || 'gray'}`;
                            }
                        }
                    });
                    if (subtitlesEnabled) startSubtitleTimer();
                }).catch(() => {
                    setTimeout(() => video.play().catch(() => {}), 500);
                });
            });

            hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    console.warn('HLS Error:', data);
                    hlsInstance.destroy();
                    hlsInstance = null;
                    channelStatus[channel.url] = 'red';
                    updateStats();
                    if (autoSkipEnabled) {
                        nowPlayingEl.textContent = `⚠️ ${channel.name} ব্যর্থ, স্কিপ...`;
                        setTimeout(() => nextChannel(), 2000);
                    } else {
                        nowPlayingEl.textContent = `❌ ${channel.name} - এরর`;
                        playBtn.textContent = '▶';
                    }
                }
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = channel.url;
            video.play().then(() => {
                isPlaying = true;
                playBtn.textContent = '⏸';
                nowPlayingEl.textContent = `▶️ ${channel.name}`;
                channelStatus[channel.url] = 'green';
                updateStats();
                if (subtitlesEnabled) startSubtitleTimer();
            }).catch(() => {
                setTimeout(() => video.play().catch(() => {}), 500);
            });
        } else {
            nowPlayingEl.textContent = '❌ HLS সাপোর্ট করে না';
            channelStatus[channel.url] = 'red';
            updateStats();
            return;
        }

        skipTimer = setTimeout(() => {
            if (autoSkipEnabled && currentIndex === index) {
                if (video.readyState < 2) {
                    nowPlayingEl.textContent = `⏱️ ${channel.name} লোড হয়নি, স্কিপ...`;
                    channelStatus[channel.url] = 'red';
                    updateStats();
                    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                    nextChannel();
                }
            }
        }, 30000);
    }

    function nextChannel() {
        if (channels.length === 0) return;
        let next = currentIndex + 1;
        if (next >= channels.length) next = 0;
        if (next === currentIndex && channels.length > 1) next = (next + 1) % channels.length;
        playChannel(next);
    }

    function prevChannel() {
        if (channels.length === 0) return;
        let prev = currentIndex - 1;
        if (prev < 0) prev = channels.length - 1;
        playChannel(prev);
    }

    function toggleAutoSkip() {
        autoSkipEnabled = !autoSkipEnabled;
        toggleBtn.textContent = autoSkipEnabled ? '▶️ অটো' : '⏸️ বন্ধ';
        toggleBtn.style.background = autoSkipEnabled ? 'var(--primary)' : '#ff5252';
        toggleBtn.style.color = autoSkipEnabled ? '#000' : '#fff';
        if (autoSkipEnabled && hlsInstance === null && currentIndex >= 0) {
            nextChannel();
        }
    }

    // ============================================================
    //  কন্ট্রোল ইভেন্ট
    // ============================================================
    playBtn.addEventListener('click', () => {
        if (video.paused) {
            video.play().catch(() => {});
            playBtn.textContent = '⏸';
            isPlaying = true;
            if (subtitlesEnabled) startSubtitleTimer();
        } else {
            video.pause();
            playBtn.textContent = '▶';
            isPlaying = false;
            stopSubtitleTimer();
        }
    });

    stopBtn.addEventListener('click', () => {
        video.pause();
        video.currentTime = 0;
        playBtn.textContent = '▶';
        isPlaying = false;
        stopSubtitleTimer();
        hideSubtitles();
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        nowPlayingEl.textContent = '⏹ স্টপ';
    });

    video.addEventListener('timeupdate', () => {
        if (video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            progressFill.style.width = percent + '%';
        }
        const current = formatTime(video.currentTime);
        const duration = formatTime(video.duration);
        timeDisplay.textContent = `${current} / ${duration}`;
    });

    video.addEventListener('progress', () => {
        if (video.buffered.length > 0) {
            const bufferedEnd = video.buffered.end(video.buffered.length - 1);
            const duration = video.duration;
            if (duration) {
                const percent = (bufferedEnd / duration) * 100;
                progressBuffer.style.width = percent + '%';
            }
        }
    });

    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        if (video.duration) {
            video.currentTime = x * video.duration;
        }
    });

    volumeSlider.addEventListener('input', () => {
        video.volume = parseFloat(volumeSlider.value);
        if (video.volume === 0) { muteBtn.textContent = '🔇'; isMuted = true; } 
        else { muteBtn.textContent = '🔊'; isMuted = false; }
    });

    muteBtn.addEventListener('click', () => {
        if (isMuted) {
            video.volume = parseFloat(volumeSlider.value) || 0.5;
            muteBtn.textContent = '🔊';
            isMuted = false;
        } else {
            video.volume = 0;
            muteBtn.textContent = '🔇';
            isMuted = true;
        }
    });

    qualitySelect.addEventListener('change', () => {
        currentQuality = qualitySelect.value;
        if (hlsInstance) {
            const levels = hlsInstance.levels;
            if (levels && levels.length > 0) {
                if (currentQuality === 'auto') { hlsInstance.currentLevel = -1; } 
                else {
                    const map = { '1080p': 0, '720p': 1, '480p': 2, '360p': 3 };
                    const idx = map[currentQuality] !== undefined ? map[currentQuality] : -1;
                    hlsInstance.currentLevel = (idx >= 0 && idx < levels.length) ? idx : levels.length - 1;
                }
            }
        }
    });

    fullscreenBtn.addEventListener('click', () => {
        const container = document.querySelector('.player-container');
        if (!document.fullscreenElement) {
            container.requestFullscreen?.() || container.webkitRequestFullscreen?.();
        } else {
            document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        }
    });

    video.addEventListener('error', () => {
        if (currentIndex >= 0 && channels[currentIndex]) {
            channelStatus[channels[currentIndex].url] = 'red';
            updateStats();
        }
        if (autoSkipEnabled && currentIndex >= 0) {
            nowPlayingEl.textContent = `⚠️ প্লেব্যাক এরর, স্কিপ...`;
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            setTimeout(() => nextChannel(), 2000);
        }
    });

    function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return '00:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    document.addEventListener('fullscreenchange', function() {
        if (document.fullscreenElement) {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }
    });

    // ============================================================
    //  উইন্ডো লোড
    // ============================================================
    window.onload = function() {
        updateVisitorCount();
        document.getElementById('playlist-url').value = 'https://iptv-org.github.io/iptv/index.category.m3u';
        setTimeout(loadDefaultPlaylists, 500);
        toggleBtn.style.background = 'var(--primary)';
        toggleBtn.style.color = '#000';
        subToggle.classList.add('active');
        subtitlesEnabled = true;
        
        setInterval(() => {
            const viewers = Math.floor(Math.random() * 50) + 5;
            onlineViewersEl.textContent = viewers;
            liveCountEl.textContent = viewers + Math.floor(Math.random() * 20);
        }, 30000);
        
        console.log('⚡ জাহাঙ্গীর আইপি টিভি - PRO EDITION প্রস্তুত!');
        console.log('🏆 FIFA World Cup চ্যানেল সহ ৫০০+ চ্যানেল লোড হয়েছে!');
    };
</script>
</body>
</html>
